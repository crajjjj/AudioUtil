# AudioUtil — neutral default config (SFW: no voice slots or SFX defined).
# Native folder-based audio player: plays loose WAV files by folder path, no
# sound-descriptor forms or ESP. All key/name matching is case- and space-
# insensitive ("Battle Cry" == "BattleCry" == "battlecry").
#
# This file holds the GLOBAL settings only — [general], [ppa], [lipsync] and the
# [gag] toggles, which are read only from this base file. The voice slots, SFX,
# routing maps and gag keywords are ADDITIVE content that accumulates from here
# plus every SKSE\Plugins\AudioUtil\config\*.toml overlay; ship those in an
# overlay, not here. A ready-to-copy overlay template lives in the sibling
# config.example\ folder (that folder is NOT loaded — copy it into config\).
#
# Full docs — merge rules, slot/category resolution, every key, the Papyrus API:
#   https://crajjjj.github.io/AudioUtil/

[general]
log_level = "info"            # trace | debug | info | warn | error
sound_flags = 0x1A            # BuildSoundDataFromFile flags (sweep via DebugPlayFile)
sound_priority = 128
voice_3d = true               # 3D-position voices at the speaker; false = flat/2D, all equally audible
voice_no_interrupt = false    # true = a still-playing channel skips the new line instead of cutting it
# sfx_slot = "SFX0"           # [[slot]] PlaySFX resolves before the [sfx] table ("" = table only)
default_female_slot = ""      # slot for unrouted female actors ("" = none; an overlay sets it)
default_male_slot = ""         # slot for unrouted male actors and creatures ("" = none)
pc_female_slot = ""           # reserved player slot; no NPC ever resolves to it ("" = none)
pc_male_slot = ""

[ppa]
enable = false                # optional third-party PPA plugin bridge, off by default
event_rate_ms = 2000          # min interval per receiver for AudioUtilPPA_Update events

[lipsync]
enable = true                 # amplitude-envelope mouth movement (loose PCM wav only)
gain = 1.0                    # 0.0-2.0 mouth-open strength
attack_ms = 30                # how fast the mouth opens toward a louder level
release_ms = 90               # how fast it closes on quiet / clip end
min_level = 0.04              # envelope levels below this keep the mouth closed
# block_categories = ["Slurp", "Orgasm"]   # categories that never drive the mouth (matched on requested name)

[groups]                      # startup volumes per group, 0.0-1.0 (MCM overrides at runtime)
pc_high = 1.0
pc_low = 1.0
partner_high = 1.0
partner_low = 1.0
sfx = 1.0
oneshot = 1.0

# ---------------------------------------------------------------------------
# Voice slots, SFX, [gag], and the voicetype/race/category routing tables are
# ADDITIVE content — define them in a config\*.toml overlay. See the annotated
# template in config.example\my_mod_slots.toml and the docs for the full
# reference and resolution rules: https://crajjjj.github.io/AudioUtil/
