# HentairimAudio — native folder-based audio for Hentairim.
# All name/key matching is case- and space-insensitive ("About To Cum" == "AboutToCum").
# Adding a voice slot: create Sound\fx\IVDT\<Id>\<Category>\*.wav folders and add a [[slot]] entry.

[general]
log_level = "info"            # trace | debug | info | warn | error
sound_flags = 0x1A            # BuildSoundDataFromFile flags (experiment via DebugPlayFile)
sound_priority = 128
voice_root = 'Sound\fx\IVDT'
sfx_root = 'Sound\fx\HentairimSFX'
default_female_slot = "F1"
default_male_slot = "M1"

[ppa]
enable = true
event_rate_ms = 500           # min interval per receiver for HentairimPPA_Update mod events

# ---------- voice slots ----------

[[slot]]
id = "F1"
sex = "female"
path = 'Sound\fx\IVDT\F1'

[[slot]]
id = "M1"
sex = "male"
path = 'Sound\fx\IVDT\M1'

[[slot]]
id = "M2"
sex = "male"
path = 'Sound\fx\IVDT\M2'

[[slot]]
id = "M3"
sex = "male"
path = 'Sound\fx\IVDT\M3'

[[slot]]
